<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#080c14"/>
  <title>Vào lớp</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --surface: #0e1520;
      --border: #1c2a3a;
      --accent: #2D8CFF;
      --accent-glow: rgba(45,140,255,0.3);
      --success: #22c55e;
      --success-glow: rgba(34,197,94,0.3);
      --danger: #ef4444;
      --text: #e8f0fe;
      --muted: #4a6080;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
    }
    .bg-orb { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); opacity: 0.5; }
    .bg-orb-1 { width: 400px; height: 400px; background: rgba(45,140,255,0.15); top: -120px; left: 50%; transform: translateX(-50%); }
    .bg-orb-2 { width: 250px; height: 250px; background: rgba(34,197,94,0.1); bottom: -60px; right: -60px; }
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 800px;
      padding: 40px 48px;
      display: flex;
      align-items: center;
      gap: 48px;
    }
    .join-btn {
      flex-shrink: 0;
      width: 240px; height: 240px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      font-family: 'Sora', sans-serif;
      cursor: pointer;
      position: relative;
      box-shadow: 0 0 0 10px rgba(45,140,255,0.1), 0 0 0 20px rgba(45,140,255,0.05), 0 24px 64px var(--accent-glow);
      transition: transform 0.15s, box-shadow 0.15s, background 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      -webkit-user-select: none;
      user-select: none;
    }
    .join-btn:active { transform: scale(0.95); }
    .join-btn .btn-icon { font-size: 64px; line-height: 1; }
    .join-btn .btn-label { font-size: 26px; font-weight: 600; }
    .pulse-ring {
      position: absolute; inset: -10px; border-radius: 50%;
      border: 2px solid var(--accent); opacity: 0;
      animation: pulse-ring 3s ease-out infinite;
    }
    .pulse-ring:nth-child(2) { animation-delay: 1s; }
    .pulse-ring:nth-child(3) { animation-delay: 2s; }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.45); opacity: 0; }
    }
    .join-btn.success {
      background: var(--success);
      box-shadow: 0 0 0 10px rgba(34,197,94,0.1), 0 0 0 20px rgba(34,197,94,0.05), 0 24px 64px var(--success-glow);
    }
    .join-btn.success .pulse-ring { border-color: var(--success); }
    .join-btn.error { background: #374151; box-shadow: none; }
    .join-btn:disabled { cursor: not-allowed; }
    .status-area {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }
    .status-area.success { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.05); }
    .status-area.error { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.05); }
    .status-area.loading { border-color: rgba(45,140,255,0.3); background: rgba(45,140,255,0.05); }
    .status-main { font-size: 24px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 10px; }
    .status-main.success { color: var(--success); }
    .status-main.error { color: var(--danger); }
    .status-main.loading { color: var(--accent); }
    .status-sub { font-size: 18px; color: var(--muted); line-height: 1.5; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(45,140,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="container">
  <button class="join-btn" id="joinBtn" onclick="joinClass()">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="btn-icon">📹</div>
    <div class="btn-label">Vào lớp</div>
  </button>
  <div class="status-area" id="statusArea">
    <div class="status-main" id="idleText">⏳ Đang chờ link Zoom…</div>
  </div>
</div>
<script>
  const SUPABASE_URL = 'https://cqqwsfijhngkuzfsbegx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxcXdzZmlqaG5na3V6ZnNiZWd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njc3MDEsImV4cCI6MjA5NDE0MzcwMX0.7DUiL5dOu0vcqMHIzeNwyMeIhz92bfR0N7xgGwNmk08';

  let lastHandledId = null;
  let polling = true;
  let supabaseChannel = null;
  let pollTimer = null;

  const headers = {
    apikey: SUPABASE_ANON_KEY,
    Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
  };

  // ── UI helpers ────────────────────────────────────────────────────────────
  function setStatus(type, main, sub) {
    const area = document.getElementById('statusArea');
    area.className = `status-area ${type}`;
    area.innerHTML = `
      <div class="status-main ${type}">${main}</div>
      ${sub ? `<div class="status-sub">${sub}</div>` : ''}
    `;
  }

  function setIdle() {
    const btn = document.getElementById('joinBtn');
    btn.className = 'join-btn';
    btn.disabled = false;
    polling = true;
    setStatus('', '⏳ Đang chờ link Zoom…');
  }

  // ── Time helpers ─────────────────────────────────────────────────────────
  function isClassWindow() {
    // Vietnam time = UTC+7
    const now = new Date();
    const vnOffset = 7 * 60;
    const utcMin = now.getUTCHours() * 60 + now.getUTCMinutes();
    const vnMin = (utcMin + vnOffset) % (24 * 60);
    const vnDay = (() => {
      // Compute Vietnam day of week
      const vnDate = new Date(now.getTime() + vnOffset * 60000);
      return vnDate.getUTCDay(); // 0=Sun,2=Tue,5=Fri
    })();
    const isClassDay = vnDay === 2 || vnDay === 5; // Tuesday or Friday
    const isClassTime = vnMin >= 19 * 60 + 30 && vnMin <= 21 * 60 + 30; // 7:30pm–9:30pm
    return isClassDay && isClassTime;
  }

  // ── Zoom launch ───────────────────────────────────────────────────────────
  async function launchZoom(row) {
    if (row.id === lastHandledId) return;
    lastHandledId = row.id;
    polling = false;

    const btn = document.getElementById('joinBtn');
    btn.className = 'join-btn success';
    btn.disabled = true;

    const area = document.getElementById('statusArea');
    area.className = 'status-area success';
    area.innerHTML = `<div class="status-main success" style="display:flex;align-items:center;gap:14px;"><div class="spinner" style="border-top-color:#22c55e;"></div> Đang mở Zoom…</div>`;

    // Mark as done in Supabase
    await fetch(`${SUPABASE_URL}/rest/v1/zoom_signals?id=eq.${row.id}`, {
      method: 'PATCH',
      headers: { ...headers, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ status: 'done' }),
    });

    window.location.href = convertToDeepLink(row.zoom_url);
    setTimeout(setIdle, 10000);
  }

  // ── Fetch latest signal ───────────────────────────────────────────────────
  async function fetchLatestSignal() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/zoom_signals?order=created_at.desc&limit=1`,
      { headers }
    );
    return res.json();
  }

  function isValidRow(row) {
    if (!row) return false;
    if (row.id === lastHandledId) return false;
    if (row.status === 'done') { lastHandledId = row.id; return false; }
    const age = (Date.now() - new Date(row.created_at).getTime()) / 1000 / 60;
    if (age > 180) return false;
    return true;
  }

  // ── Real-time push via Supabase websocket ─────────────────────────────────
  function connectRealtime() {
    // Supabase Realtime uses a specific websocket protocol
    const wsUrl = `${SUPABASE_URL.replace('https://', 'wss://')}/realtime/v1/websocket?apikey=${SUPABASE_ANON_KEY}&vsn=1.0.0`;
    const ws = new WebSocket(wsUrl);
    let heartbeatTimer = null;
    let ref = 1;

    ws.onopen = () => {
      console.log('[Realtime] Connected');

      // Join the postgres_changes channel
      const joinMsg = {
        topic: 'realtime:public:zoom_signals',
        event: 'phx_join',
        payload: {
          config: {
            broadcast: { self: false },
            postgres_changes: [{ event: 'INSERT', schema: 'public', table: 'zoom_signals' }]
          }
        },
        ref: String(ref++)
      };
      ws.send(JSON.stringify(joinMsg));

      // Heartbeat every 30s to keep connection alive
      heartbeatTimer = setInterval(() => {
        ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: String(ref++) }));
      }, 30000);
    };

    ws.onmessage = async (e) => {
      try {
        const msg = JSON.parse(e.data);
        // Postgres INSERT event
        if (msg.event === 'postgres_changes' || (msg.payload && msg.payload.data && msg.payload.data.type === 'INSERT')) {
          const record = msg.payload?.data?.record || msg.payload?.record;
          if (record && isValidRow(record)) {
            console.log('[Realtime] New signal received via push:', record);
            await launchZoom(record);
          }
        }
      } catch (err) {
        console.error('[Realtime] Message parse error:', err);
      }
    };

    ws.onerror = (e) => console.warn('[Realtime] WS error:', e);

    ws.onclose = () => {
      console.warn('[Realtime] Disconnected — reconnecting in 5s…');
      clearInterval(heartbeatTimer);
      setTimeout(connectRealtime, 5000);
    };

    supabaseChannel = ws;
  }

  // ── Fallback polling (Tue/Fri 7:30–9:30pm VN only) ───────────────────────
  async function pollFallback() {
    if (!polling) return;
    if (!isClassWindow()) return;

    try {
      const rows = await fetchLatestSignal();
      if (!rows || rows.length === 0) return;
      const row = rows[0];
      if (isValidRow(row)) {
        console.log('[Fallback] New signal detected via poll:', row);
        await launchZoom(row);
      }
    } catch (err) {
      console.error('[Fallback] Poll error:', err);
    }
  }

  // ── Manual tap ────────────────────────────────────────────────────────────
  async function joinClass() {
    const btn = document.getElementById('joinBtn');
    btn.disabled = true;
    polling = false;
    const area = document.getElementById('statusArea');
    area.className = 'status-area loading';
    area.innerHTML = `<div class="status-main loading" style="display:flex;align-items:center;gap:14px;"><div class="spinner"></div> Đang tìm link Zoom…</div>`;

    try {
      const rows = await fetchLatestSignal();
      if (!rows || rows.length === 0) {
        btn.className = 'join-btn error';
        setStatus('error', '😔 Chưa có link Zoom', 'Con chưa gửi link. Thử lại sau nhé Bố.');
        setTimeout(setIdle, 5000);
        return;
      }
      const row = rows[0];
      const age = (Date.now() - new Date(row.created_at).getTime()) / 1000 / 60;
      if (age > 180) {
        btn.className = 'join-btn error';
        setStatus('error', '⏰ Link đã cũ', 'Con chưa gửi link mới. Thử lại sau nhé Bố.');
        setTimeout(setIdle, 5000);
        return;
      }
      await launchZoom(row);
    } catch (err) {
      console.error(err);
      btn.className = 'join-btn error';
      setStatus('error', '❌ Lỗi kết nối', 'Kiểm tra wifi rồi thử lại Bố nhé.');
      setTimeout(setIdle, 5000);
    }
  }

  // ── Deep link converter ───────────────────────────────────────────────────
  function convertToDeepLink(url) {
    try {
      if (url.startsWith('zoommtg://') || url.startsWith('zoomus://')) return url;
      const u = new URL(url);
      const pathParts = u.pathname.split('/');
      const meetingId = pathParts[pathParts.length - 1];
      const pwd = u.searchParams.get('pwd') || '';
      let deepLink = `zoommtg://zoom.us/join?confno=${meetingId}`;
      if (pwd) deepLink += `&pwd=${pwd}`;
      return deepLink;
    } catch (e) {
      return url;
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  connectRealtime();
  setInterval(pollFallback, 10000);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(console.error);
  }
</script>
</body>
</html>
