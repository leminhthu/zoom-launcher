<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#080c14"/>
  <title>Vào lớp</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --surface: #0e1520;
      --border: #1c2a3a;
      --accent: #2D8CFF;
      --accent-glow: rgba(45,140,255,0.3);
      --success: #22c55e;
      --success-glow: rgba(34,197,94,0.3);
      --danger: #ef4444;
      --text: #e8f0fe;
      --muted: #4a6080;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px; opacity: 0.3; pointer-events: none;
    }
    .bg-orb { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); opacity: 0.5; }
    .bg-orb-1 { width: 400px; height: 400px; background: rgba(45,140,255,0.15); top: -120px; left: 50%; transform: translateX(-50%); }
    .bg-orb-2 { width: 250px; height: 250px; background: rgba(34,197,94,0.1); bottom: -60px; right: -60px; }
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 800px;
      padding: 40px 48px;
      display: flex; align-items: center; gap: 48px;
    }
    .join-btn {
      flex-shrink: 0; width: 240px; height: 240px;
      border-radius: 50%; border: none;
      background: var(--accent); color: white;
      font-family: 'Sora', sans-serif; cursor: pointer;
      position: relative;
      box-shadow: 0 0 0 10px rgba(45,140,255,0.1), 0 0 0 20px rgba(45,140,255,0.05), 0 24px 64px var(--accent-glow);
      transition: transform 0.15s, box-shadow 0.15s, background 0.3s;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
      -webkit-user-select: none; user-select: none;
    }
    .join-btn:active { transform: scale(0.95); }
    .join-btn .btn-icon { font-size: 64px; line-height: 1; }
    .join-btn .btn-label { font-size: 26px; font-weight: 600; }
    .pulse-ring {
      position: absolute; inset: -10px; border-radius: 50%;
      border: 2px solid var(--accent); opacity: 0;
      animation: pulse-ring 3s ease-out infinite;
    }
    .pulse-ring:nth-child(2) { animation-delay: 1s; }
    .pulse-ring:nth-child(3) { animation-delay: 2s; }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.45); opacity: 0; } }
    .join-btn.success {
      background: var(--success);
      box-shadow: 0 0 0 10px rgba(34,197,94,0.1), 0 0 0 20px rgba(34,197,94,0.05), 0 24px 64px var(--success-glow);
    }
    .join-btn.success .pulse-ring { border-color: var(--success); }
    .join-btn.error { background: #374151; box-shadow: none; }
    .join-btn.idle-waiting { background: #1e3a5f; box-shadow: 0 0 0 10px rgba(45,140,255,0.05); }
    .join-btn:disabled { cursor: not-allowed; }
    .status-area {
      flex: 1; background: var(--surface);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 28px 32px; min-height: 100px;
      display: flex; flex-direction: column; justify-content: center; gap: 10px;
    }
    .status-area.success { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.05); }
    .status-area.error   { border-color: rgba(239,68,68,0.3);  background: rgba(239,68,68,0.05); }
    .status-area.loading { border-color: rgba(45,140,255,0.3); background: rgba(45,140,255,0.05); }
    .status-main { font-size: 24px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 10px; }
    .status-main.success { color: var(--success); }
    .status-main.error   { color: var(--danger); }
    .status-main.loading { color: var(--accent); }
    .status-sub { font-size: 18px; color: var(--muted); line-height: 1.5; }
    .spinner { width: 28px; height: 28px; border: 3px solid rgba(45,140,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .wake-banner {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3);
      border-radius: 12px; padding: 10px 20px;
      font-size: 13px; color: #f59e0b;
      white-space: nowrap; z-index: 10; display: none;
    }
    .wake-banner.visible { display: block; }
  </style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="container">
  <button class="join-btn idle-waiting" id="joinBtn" onclick="joinClass()">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="btn-icon">📹</div>
    <div class="btn-label">Vào lớp</div>
  </button>
  <div class="status-area" id="statusArea">
    <div class="status-main">⏳ Đang chờ…</div>
  </div>
</div>
<div class="wake-banner" id="wakeBanner">
  ⚠️ Không giữ được màn hình sáng — đừng để tablet ngủ nhé Bố
</div>

<script>
  const SUPABASE_URL = 'https://cqqwsfijhngkuzfsbegx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxcXdzZmlqaG5na3V6ZnNiZWd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njc3MDEsImV4cCI6MjA5NDE0MzcwMX0.7DUiL5dOu0vcqMHIzeNwyMeIhz92bfR0N7xgGwNmk08';
  const POLLING_WINDOW_MINUTES = 30;
  const POLL_INTERVAL = 5000;

  let lastHandledId = null;
  let wakeLock = null;
  let isPollingActive = false;

  const headers = {
    apikey: SUPABASE_ANON_KEY,
    Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
  };

  // ── UI helpers ────────────────────────────────────────────────────────────
  function setStatus(type, main, sub) {
    const area = document.getElementById('statusArea');
    area.className = `status-area ${type}`;
    area.innerHTML = `
      <div class="status-main ${type}">${main}</div>
      ${sub ? `<div class="status-sub">${sub}</div>` : ''}
    `;
  }

  function setIdle() {
    const btn = document.getElementById('joinBtn');
    btn.className = isPollingActive ? 'join-btn' : 'join-btn idle-waiting';
    btn.disabled = false;
    if (isPollingActive) {
      setStatus('loading', '<span style="display:flex;align-items:center;gap:14px;"><span class="spinner"></span> Đang chờ link Zoom…</span>');
    } else {
      setStatus('', '⏳ Đang chờ…');
    }
  }

  // ── Trigger check ─────────────────────────────────────────────────────────
  async function checkTrigger() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/polling_trigger?id=eq.1`, { headers });
      const rows = await res.json();
      if (!rows || !rows.length) { isPollingActive = false; return false; }
      const age = (Date.now() - new Date(rows[0].triggered_at).getTime()) / 1000 / 60;
      isPollingActive = age < POLLING_WINDOW_MINUTES;
      return isPollingActive;
    } catch(e) {
      return false;
    }
  }

  // ── Fetch & validate signal ───────────────────────────────────────────────
  async function fetchLatestSignal() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/zoom_signals?order=created_at.desc&limit=1`,
      { headers }
    );
    return res.json();
  }

  function isValidRow(row) {
    if (!row) return false;
    if (row.id === lastHandledId) return false;
    if (row.status === 'done') { lastHandledId = row.id; return false; }
    const age = (Date.now() - new Date(row.created_at).getTime()) / 1000 / 60;
    if (age > 180) return false;
    return true;
  }

  // ── Zoom launch ───────────────────────────────────────────────────────────
  async function launchZoom(row) {
    if (row.id === lastHandledId) return;
    lastHandledId = row.id;

    const btn = document.getElementById('joinBtn');
    btn.className = 'join-btn success';
    btn.disabled = true;
    setStatus('success', '✅ Đang mở Zoom…');

    await fetch(`${SUPABASE_URL}/rest/v1/zoom_signals?id=eq.${row.id}`, {
      method: 'PATCH',
      headers: { ...headers, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ status: 'done' }),
    });

    await tryLaunchZoom(row.zoom_url);
    setTimeout(setIdle, 10000);
  }

  // ── Main poll ─────────────────────────────────────────────────────────────
  async function poll() {
    const active = await checkTrigger();
    setIdle(); // update button/status to reflect polling state
    if (!active) return;

    try {
      const rows = await fetchLatestSignal();
      if (!rows || !rows.length) return;
      if (isValidRow(rows[0])) await launchZoom(rows[0]);
    } catch(err) {
      console.error('[Poll] Error:', err);
    }
  }

  // ── Manual tap ────────────────────────────────────────────────────────────
  async function joinClass() {
    const btn = document.getElementById('joinBtn');
    btn.disabled = true;
    const area = document.getElementById('statusArea');
    area.className = 'status-area loading';
    area.innerHTML = `<div class="status-main loading" style="display:flex;align-items:center;gap:14px;"><div class="spinner"></div> Đang tìm link Zoom…</div>`;

    try {
      const rows = await fetchLatestSignal();
      if (!rows || !rows.length) {
        btn.className = 'join-btn error';
        setStatus('error', '😔 Chưa có link Zoom', 'Con chưa gửi link. Thử lại sau nhé Bố.');
        setTimeout(setIdle, 5000);
        return;
      }
      const row = rows[0];
      const age = (Date.now() - new Date(row.created_at).getTime()) / 1000 / 60;
      if (age > 180) {
        btn.className = 'join-btn error';
        setStatus('error', '⏰ Link đã cũ', 'Con chưa gửi link mới. Thử lại sau nhé Bố.');
        setTimeout(setIdle, 5000);
        return;
      }
      await launchZoom(row);
    } catch(err) {
      const btn = document.getElementById('joinBtn');
      btn.className = 'join-btn error';
      setStatus('error', '❌ Lỗi kết nối', 'Kiểm tra wifi rồi thử lại Bố nhé.');
      setTimeout(setIdle, 5000);
    }
  }

  // ── Deep link ─────────────────────────────────────────────────────────────
  function parseZoomUrl(url) {
    // Handles all Zoom URL formats:
    // https://zoom.us/j/MEETINGID?pwd=XXX
    // https://us05web.zoom.us/j/MEETINGID?pwd=XXX
    // https://us06web.zoom.us/j/MEETINGID?pwd=XXX
    // https://zoom.us/wc/join/MEETINGID
    try {
      const u = new URL(url);
      const parts = u.pathname.split('/').filter(Boolean);
      // Find meeting ID — it's the numeric segment after /j/ or /join/
      let meetingId = null;
      for (let i = 0; i < parts.length; i++) {
        if ((parts[i] === 'j' || parts[i] === 'join') && parts[i + 1]) {
          meetingId = parts[i + 1].replace(/\D/g, ''); // strip non-digits
          break;
        }
      }
      // Fallback: last numeric-looking segment
      if (!meetingId) meetingId = parts[parts.length - 1].replace(/\D/g, '');
      const pwd = u.searchParams.get('pwd') || '';
      return { meetingId, pwd };
    } catch(e) { return null; }
  }

  function convertToDeepLink(url) {
    if (url.startsWith('zoommtg://') || url.startsWith('zoomus://')) return url;
    const parsed = parseZoomUrl(url);
    if (!parsed) return url;
    const { meetingId, pwd } = parsed;
    return `zoommtg://zoom.us/join?confno=${meetingId}${pwd ? '&pwd=' + pwd : ''}`;
  }

  async function tryLaunchZoom(originalUrl) {
    const parsed = parseZoomUrl(originalUrl);
    if (!parsed) { window.location.href = originalUrl; return; }
    const { meetingId, pwd } = parsed;

    // Strategy 1: zoommtg:// deep link
    window.location.href = `zoommtg://zoom.us/join?confno=${meetingId}${pwd ? '&pwd=' + pwd : ''}`;
    await new Promise(r => setTimeout(r, 3000));

    // Strategy 2: zoomus:// (alternative scheme some Android versions prefer)
    window.location.href = `zoomus://zoom.us/join?confno=${meetingId}${pwd ? '&pwd=' + pwd : ''}`;
    await new Promise(r => setTimeout(r, 3000));

    // Strategy 3: Android intent:// (most forceful, bypasses scheme resolution)
    window.location.href = `intent://zoom.us/join?confno=${meetingId}${pwd ? '&pwd=' + pwd : ''}#Intent;scheme=zoommtg;package=us.zoom.videomeetings;end`;
    await new Promise(r => setTimeout(r, 3000));

    // Strategy 4: fall back to original https URL — triggers "Open with Zoom?" system dialog
    window.location.href = originalUrl;
  }

  // ── Wake Lock ─────────────────────────────────────────────────────────────
  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) { document.getElementById('wakeBanner').classList.add('visible'); return; }
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wakeBanner').classList.remove('visible');
      wakeLock.addEventListener('release', () => {
        document.getElementById('wakeBanner').classList.add('visible');
        setTimeout(requestWakeLock, 2000);
      });
    } catch(err) {
      document.getElementById('wakeBanner').classList.add('visible');
    }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      requestWakeLock();
      poll();
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  poll(); // immediate check on load
  setInterval(poll, POLL_INTERVAL);
  requestWakeLock();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(console.error);
  }
</script>
</body>
</html>
