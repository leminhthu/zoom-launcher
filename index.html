<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0d1117"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>Vào lớp</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; width: 100%; overflow: hidden; }

    body {
      font-family: 'Sora', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 32px 28px;
      gap: 20px;
      transition: background 0.5s ease;
      position: relative;
    }

    body.state-wait    { background: #0d1117; }
    body.state-ready   { background: #0a1f3d; }
    body.state-joining { background: #0a2318; }
    body.state-error   { background: #0d1117; }

    .grid-overlay {
      position: fixed; inset: 0; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 28px 28px;
      transition: opacity 0.5s;
    }
    body.state-ready .grid-overlay,
    body.state-joining .grid-overlay { opacity: 0; }

    .top-icon {
      font-size: 64px; line-height: 1;
      transition: opacity 0.4s;
      position: relative; z-index: 1;
    }

    .main-msg {
      font-size: 32px; font-weight: 700;
      line-height: 1.3;
      transition: color 0.4s;
      position: relative; z-index: 1;
    }
    body.state-wait    .main-msg { color: #b8d4f0; }
    body.state-ready   .main-msg { color: #60aaff; }
    body.state-joining .main-msg { color: #4ade80; }
    body.state-error   .main-msg { color: #ef4444; }

    /* Big tap button */
    .tap-btn {
      width: 180px; height: 180px;
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; cursor: pointer; border: none;
      font-family: 'Sora', sans-serif;
      position: relative; z-index: 1;
      transition: background 0.4s, box-shadow 0.4s, transform 0.15s;
      -webkit-user-select: none; user-select: none;
    }
    .tap-btn:active { transform: scale(0.94); }

    body.state-wait .tap-btn, body.state-error .tap-btn {
      background: #1a1f2e;
      border: 3px dashed #2a3a50;
      box-shadow: none;
    }
    body.state-ready .tap-btn {
      background: #2D8CFF;
      box-shadow: 0 0 0 14px rgba(45,140,255,0.18), 0 0 0 28px rgba(45,140,255,0.08);
      animation: pulse-ready 1.2s ease-in-out infinite;
    }
    body.state-joining .tap-btn {
      background: #22c55e;
      box-shadow: 0 0 0 14px rgba(34,197,94,0.18), 0 0 0 28px rgba(34,197,94,0.08);
      animation: none;
    }
    @keyframes pulse-ready {
      0%,100% { box-shadow: 0 0 0 14px rgba(45,140,255,0.18), 0 0 0 28px rgba(45,140,255,0.08); }
      50%      { box-shadow: 0 0 0 22px rgba(45,140,255,0.25), 0 0 0 38px rgba(45,140,255,0.12); }
    }

    .btn-icon {
      font-size: 56px; line-height: 1;
      transition: opacity 0.4s;
    }
    body.state-wait .btn-icon,
    body.state-error .btn-icon { opacity: 0.15; }

    .btn-label {
      font-size: 15px; font-weight: 700;
      transition: color 0.4s;
    }
    body.state-wait .btn-label,
    body.state-error .btn-label { color: #2a3a50; }
    body.state-ready .btn-label,
    body.state-joining .btn-label { color: white; }

    /* Bottom strip */
    .strip {
      width: 100%; max-width: 340px;
      padding: 12px 20px; border-radius: 12px;
      font-size: 15px; font-weight: 500;
      transition: background 0.4s, color 0.4s;
      position: relative; z-index: 1;
    }
    body.state-wait .strip, body.state-error .strip {
      background: rgba(255,255,255,0.03); color: #3a5070;
    }
    body.state-ready .strip {
      background: rgba(45,140,255,0.15); color: #90c4ff;
    }
    body.state-joining .strip {
      background: rgba(34,197,94,0.15); color: #86efac;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(45,140,255,0.2);
      border-top-color: #60aaff;
      border-radius: 50%;
      display: inline-block; vertical-align: -3px;
      margin-right: 8px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .wake-banner {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3);
      border-radius: 12px; padding: 10px 20px;
      font-size: 13px; color: #f59e0b;
      white-space: nowrap; z-index: 10; display: none;
    }
    .wake-banner.visible { display: block; }
  </style>
</head>
<body class="state-wait">

<div class="grid-overlay"></div>

<div class="top-icon" id="topIcon">📹</div>
<div class="main-msg" id="mainMsg">Chờ con gửi link…</div>

<button class="tap-btn" id="tapBtn" onclick="onTap()">
  <div class="btn-icon" id="btnIcon">👆</div>
  <div class="btn-label" id="btnLabel">Chờ chút</div>
</button>

<div class="strip" id="strip">
  <span class="spinner"></span>Đang chờ link Zoom
</div>

<div class="wake-banner" id="wakeBanner">
  ⚠️ Không giữ được màn hình sáng — đừng để tablet ngủ nhé Bố
</div>

<script>
  const SUPABASE_URL = 'https://cqqwsfijhngkuzfsbegx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxcXdzZmlqaG5na3V6ZnNiZWd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njc3MDEsImV4cCI6MjA5NDE0MzcwMX0.7DUiL5dOu0vcqMHIzeNwyMeIhz92bfR0N7xgGwNmk08';
  const POLLING_WINDOW_MINUTES = 30;
  const POLL_INTERVAL = 5000;

  let lastHandledId = null;
  let pendingRow = null;
  let wakeLock = null;
  let isPollingActive = false;
  let currentState = 'wait';

  const headers = {
    apikey: SUPABASE_ANON_KEY,
    Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
  };

  // ── State machine ─────────────────────────────────────────────────────────
  function setState(state) {
    currentState = state;
    const body = document.body;
    body.className = `state-${state}`;

    const topIcon  = document.getElementById('topIcon');
    const mainMsg  = document.getElementById('mainMsg');
    const btnIcon  = document.getElementById('btnIcon');
    const btnLabel = document.getElementById('btnLabel');
    const strip    = document.getElementById('strip');
    const btn      = document.getElementById('tapBtn');

    if (state === 'wait') {
      topIcon.textContent  = '📹';
      mainMsg.textContent  = 'Chờ con gửi link…';
      btnIcon.textContent  = '👆';
      btnLabel.textContent = 'Chờ chút';
      strip.innerHTML      = '<span class="spinner"></span>Đang chờ link Zoom';
      btn.disabled = false;
    } else if (state === 'ready') {
      topIcon.textContent  = '🎉';
      mainMsg.textContent  = 'Zoom sẵn sàng!';
      btnIcon.textContent  = '👆';
      btnLabel.textContent = 'Nhấn vào đây';
      strip.textContent    = 'Nhấn nút để vào lớp học';
      btn.disabled = false;
      playChime();
    } else if (state === 'joining') {
      topIcon.textContent  = '✅';
      mainMsg.textContent  = 'Đang mở Zoom…';
      btnIcon.textContent  = '📹';
      btnLabel.textContent = 'Đang mở Zoom';
      strip.textContent    = 'Chúc Bố học vui!';
      btn.disabled = true;
    } else if (state === 'error') {
      topIcon.textContent  = '😔';
      mainMsg.textContent  = 'Chưa có link Zoom';
      btnIcon.textContent  = '👆';
      btnLabel.textContent = 'Chờ chút';
      strip.textContent    = 'Tự động thử lại sau 5 giây…';
      btn.disabled = false;
      setTimeout(() => setState('wait'), 5000);
    }
  }

  // ── Gentle chime ──────────────────────────────────────────────────────────
  function playChime() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523.25, 659.25, 783.99]; // C5, E5, G5 — gentle major chord
      notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const start = ctx.currentTime + i * 0.18;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.12, start + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.8);
        osc.start(start);
        osc.stop(start + 0.8);
      });
    } catch(e) {}
  }

  // ── Tap handler ───────────────────────────────────────────────────────────
  async function onTap() {
    if (currentState === 'ready' && pendingRow) {
      await doLaunch(pendingRow);
      return;
    }
    // Manual check (tapped in state-wait or state-error)
    try {
      const rows = await fetchLatestSignal();
      if (!rows || !rows.length) { setState('error'); return; }
      const row = rows[0];
      const age = (Date.now() - new Date(row.created_at).getTime()) / 1000 / 60;
      if (row.status === 'done' || age > 180) { setState('error'); return; }
      pendingRow = row;
      setState('ready');
    } catch(e) {
      setState('error');
    }
  }

  // ── Launch Zoom ───────────────────────────────────────────────────────────
  async function doLaunch(row) {
    if (row.id === lastHandledId) return;
    lastHandledId = row.id;
    pendingRow = null;
    setState('joining');

    await fetch(`${SUPABASE_URL}/rest/v1/zoom_signals?id=eq.${row.id}`, {
      method: 'PATCH',
      headers: { ...headers, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ status: 'done' }),
    });

    await tryLaunchZoom(row.zoom_url);
    setTimeout(() => setState('wait'), 10000);
  }

  // ── Zoom launch strategies ────────────────────────────────────────────────
  function parseZoomUrl(url) {
    try {
      const u = new URL(url);
      const parts = u.pathname.split('/').filter(Boolean);
      let meetingId = null;
      for (let i = 0; i < parts.length; i++) {
        if ((parts[i] === 'j' || parts[i] === 'join') && parts[i + 1]) {
          meetingId = parts[i + 1].replace(/[^0-9]/g, '');
          break;
        }
      }
      if (!meetingId) meetingId = parts[parts.length - 1].replace(/[^0-9]/g, '');
      const pwd = u.searchParams.get('pwd') || '';
      return { meetingId, pwd };
    } catch(e) { return null; }
  }

  async function tryLaunchZoom(originalUrl) {
    const parsed = parseZoomUrl(originalUrl);
    if (!parsed) { window.open(originalUrl, '_blank'); return; }
    const { meetingId, pwd } = parsed;
    const pwdParam = pwd ? `&pwd=${pwd}` : '';

    // Open in new tab so the app tab stays intact
    const tab = window.open(`zoommtg://zoom.us/join?confno=${meetingId}${pwdParam}`, '_blank');
    await new Promise(r => setTimeout(r, 3000));
    if (tab) tab.location.href = `zoomus://zoom.us/join?confno=${meetingId}${pwdParam}`;
    await new Promise(r => setTimeout(r, 3000));
    if (tab) tab.location.href = `intent://zoom.us/join?confno=${meetingId}${pwdParam}#Intent;scheme=zoommtg;package=us.zoom.videomeetings;end`;
    await new Promise(r => setTimeout(r, 3000));
    if (tab) tab.location.href = originalUrl;
  }

  // ── Poll ──────────────────────────────────────────────────────────────────
  async function fetchLatestSignal() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/zoom_signals?order=created_at.desc&limit=1`,
      { headers }
    );
    return res.json();
  }

  async function checkTrigger() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/polling_trigger?id=eq.1`, { headers });
      const rows = await res.json();
      if (!rows || !rows.length) return false;
      const age = (Date.now() - new Date(rows[0].triggered_at).getTime()) / 1000 / 60;
      return age < POLLING_WINDOW_MINUTES;
    } catch(e) { return false; }
  }

  async function poll() {
    if (currentState === 'joining' || currentState === 'ready') return;
    const active = await checkTrigger();
    isPollingActive = active;
    if (!active) return;

    try {
      const rows = await fetchLatestSignal();
      if (!rows || !rows.length) return;
      const row = rows[0];
      if (row.id === lastHandledId) return;
      if (row.status === 'done') { lastHandledId = row.id; return; }
      const age = (Date.now() - new Date(row.created_at).getTime()) / 1000 / 60;
      if (age > 180) return;
      // New valid link found — go to ready state, wait for tap
      pendingRow = row;
      setState('ready');
    } catch(e) {}
  }

  // ── Wake Lock ─────────────────────────────────────────────────────────────
  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) { document.getElementById('wakeBanner').classList.add('visible'); return; }
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wakeBanner').classList.remove('visible');
      wakeLock.addEventListener('release', () => {
        document.getElementById('wakeBanner').classList.add('visible');
        setTimeout(requestWakeLock, 2000);
      });
    } catch(e) {
      document.getElementById('wakeBanner').classList.add('visible');
    }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      requestWakeLock();
      poll();
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  setState('wait');
  poll();
  setInterval(poll, POLL_INTERVAL);
  requestWakeLock();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(console.error);
  }
</script>
</body>
</html>
