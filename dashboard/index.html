<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bố's Zoom Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --surface: #0e1520;
      --border: #1c2a3a;
      --accent: #2D8CFF;
      --accent-glow: rgba(45,140,255,0.25);
      --success: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #e8f0fe;
      --muted: #4a6080;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Sora', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(45,140,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      width: 100%; max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      position: relative; z-index: 1;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; gap: 28px;
    }
    .header { text-align: center; }
    .header .label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .header h1 { font-size: 26px; font-weight: 700; }
    .header h1 span { color: var(--accent); }
    .header .sub { margin-top: 6px; font-size: 13px; color: var(--muted); font-weight: 300; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    label.field-label {
      display: block;
      font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      resize: none; height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    textarea::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%; margin-top: 12px;
      padding: 16px; border-radius: 12px; border: none;
      font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer;
      background: var(--accent); color: white;
      box-shadow: 0 4px 24px var(--accent-glow);
      transition: all 0.2s;
    }
    .btn-primary:hover:not(:disabled) { background: #4fa3ff; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Polling countdown banner */
    .polling-banner {
      display: none;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 13px;
      align-items: center;
      gap: 12px;
    }
    .polling-banner.visible { display: flex; }
    .polling-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .polling-text { flex: 1; color: var(--success); }
    .polling-text small { display: block; color: #4a9060; font-size: 11px; margin-top: 2px; }
    .polling-expires { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #4a9060; flex-shrink: 0; }

    .toast {
      padding: 12px 16px; border-radius: 10px;
      font-size: 13px; display: none;
      align-items: center; gap: 10px;
    }
    .toast.success { display: flex; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
    .toast.error   { display: flex; background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: var(--danger); }
    .toast.waiting { display: flex; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: var(--warn); }

    .history-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; }
    .history-item:last-child { border-bottom: none; }
    .history-item .time { color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
    .badge.done      { background: rgba(34,197,94,0.15); color: var(--success); }
    .badge.received  { background: rgba(245,158,11,0.15); color: var(--warn); }
    .badge.pending   { background: rgba(45,140,255,0.15); color: var(--accent); }
    .badge.cancelled { background: rgba(100,100,100,0.15); color: #666; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="label">Remote Class Helper</div>
    <h1>Bố's <span>Zoom</span> Launcher</h1>
    <p class="sub">Paste the link — Bố's tablet joins automatically</p>
  </div>

  <!-- Polling status banner -->
  <div class="polling-banner" id="pollingBanner">
    <div class="polling-dot"></div>
    <div class="polling-text">
      Bố's tablet is polling for the link
      <small>Zoom will launch automatically within 5 seconds</small>
    </div>
    <div class="polling-expires" id="expiresIn"></div>
  </div>

  <!-- Link sender -->
  <div>
    <label class="field-label" for="zoomUrl">Zoom meeting link</label>
    <textarea id="zoomUrl" placeholder="https://zoom.us/j/123456789?pwd=..." spellcheck="false"></textarea>
    <button class="btn-primary" id="sendBtn" onclick="sendLink()">🚀 Launch on Bố's Tablet</button>
    <div class="toast" id="toast" style="margin-top:12px;"></div>
  </div>

  <!-- History -->
  <div id="historySection" style="display:none;">
    <hr class="divider" style="margin-bottom:20px;"/>
    <div class="history-title">Recent signals</div>
    <div id="historyList"></div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://cqqwsfijhngkuzfsbegx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxcXdzZmlqaG5na3V6ZnNiZWd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njc3MDEsImV4cCI6MjA5NDE0MzcwMX0.7DUiL5dOu0vcqMHIzeNwyMeIhz92bfR0N7xgGwNmk08';
  const POLLING_WINDOW_MINUTES = 30;

  const headers = {
    apikey: SUPABASE_ANON_KEY,
    Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
    'Content-Type': 'application/json',
  };

  let triggerTime = null;
  let bannerTimer = null;

  // ── Send link + trigger ───────────────────────────────────────────────────
  async function sendLink() {
    const url = document.getElementById('zoomUrl').value.trim();
    if (!url || !url.startsWith('http')) {
      showToast('error', '⚠️ Please paste a valid Zoom link first.');
      return;
    }
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      // 1. Cancel any existing pending rows before inserting new one
      await fetch(`${SUPABASE_URL}/rest/v1/zoom_signals?status=eq.pending`, {
        method: 'PATCH',
        headers: { ...headers, Prefer: 'return=minimal' },
        body: JSON.stringify({ status: 'cancelled' }),
      });

      // 2. Insert zoom signal
      const sigRes = await fetch(`${SUPABASE_URL}/rest/v1/zoom_signals`, {
        method: 'POST',
        headers: { ...headers, Prefer: 'return=minimal' },
        body: JSON.stringify({ zoom_url: url, status: 'pending' }),
      });
      if (!sigRes.ok) throw new Error(`HTTP ${sigRes.status}`);

      // 2. Upsert polling trigger with current timestamp
      await fetch(`${SUPABASE_URL}/rest/v1/polling_trigger?id=eq.1`, {
        method: 'PATCH',
        headers: { ...headers, Prefer: 'return=minimal' },
        body: JSON.stringify({ triggered_at: new Date().toISOString() }),
      }).then(r => {
        if (!r.ok) {
          return fetch(`${SUPABASE_URL}/rest/v1/polling_trigger`, {
            method: 'POST',
            headers: { ...headers, Prefer: 'return=minimal' },
            body: JSON.stringify({ id: 1, triggered_at: new Date().toISOString() }),
          });
        }
      });

      triggerTime = Date.now();
      document.getElementById('zoomUrl').value = '';
      showToast('waiting', '📡 Sent! Bố\'s tablet will join within 5 seconds…');
      startBannerCountdown();
      loadHistory();
      pollForCompletion();
    } catch (err) {
      showToast('error', '❌ Failed to send. Check your connection.');
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = "🚀 Launch on Bố's Tablet";
    }
  }

  // ── Polling banner countdown ──────────────────────────────────────────────
  function startBannerCountdown() {
    clearInterval(bannerTimer);
    document.getElementById('pollingBanner').classList.add('visible');
    updateBanner();
    bannerTimer = setInterval(updateBanner, 10000);
  }

  function updateBanner() {
    if (!triggerTime) return;
    const elapsed = (Date.now() - triggerTime) / 1000 / 60;
    const remaining = Math.max(0, POLLING_WINDOW_MINUTES - elapsed);
    if (remaining <= 0) {
      document.getElementById('pollingBanner').classList.remove('visible');
      clearInterval(bannerTimer);
      return;
    }
    const mins = Math.ceil(remaining);
    document.getElementById('expiresIn').textContent = `${mins}m left`;
  }

  // ── Completion polling (dashboard side) ──────────────────────────────────
  async function pollForCompletion() {
    let attempts = 0;
    const interval = setInterval(async () => {
      attempts++;
      if (attempts > 36) { clearInterval(interval); return; }
      const rows = await getLatestSignal();
      if (!rows || !rows.length) return;
      const row = rows[0];
      if (row.status === 'done') {
        clearInterval(interval);
        showToast('success', '✅ Bố has joined the Zoom class!');
        loadHistory();
      }
    }, 5000);
  }

  async function getLatestSignal() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/zoom_signals?order=created_at.desc&limit=1`, { headers });
    return res.json();
  }

  // ── History ───────────────────────────────────────────────────────────────
  async function loadHistory() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/zoom_signals?order=created_at.desc&limit=5`, { headers });
      const rows = await res.json();
      if (!rows || !rows.length) return;
      document.getElementById('historySection').style.display = 'block';
      document.getElementById('historyList').innerHTML = rows.map(r => {
        const d = new Date(r.created_at);
        const time = d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        const date = d.toLocaleDateString('vi-VN', { weekday: 'short', day: 'numeric', month: 'numeric' });
        return `<div class="history-item"><span class="time">${date} ${time}</span><span class="badge ${r.status}">${r.status}</span></div>`;
      }).join('');
    } catch(e) {}
  }

  function showToast(type, msg) {
    const t = document.getElementById('toast');
    t.className = `toast ${type}`;
    t.innerHTML = type === 'waiting'
      ? `<div class="spinner"></div><span>${msg}</span>`
      : `<span>${msg}</span>`;
  }

  // Check if there's an active trigger on load (e.g. you reopen the dashboard)
  async function checkExistingTrigger() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/polling_trigger?id=eq.1`, { headers });
      const rows = await res.json();
      if (!rows || !rows.length) return;
      const triggered = new Date(rows[0].triggered_at).getTime();
      const age = (Date.now() - triggered) / 1000 / 60;
      if (age < POLLING_WINDOW_MINUTES) {
        triggerTime = triggered;
        startBannerCountdown();
      }
    } catch(e) {}
  }

  loadHistory();
  checkExistingTrigger();
  setInterval(loadHistory, 15000);
</script>
</body>
</html>
